apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-backup
  namespace: elasticsearch
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            role: elasticsearch
          tolerations:
            - key: dedicated
              operator: Equal
              value: elasticsearch
              effect: NoSchedule
          containers:
            - name: snapshot
              image: curlimages/curl:8.7.1
              command:
                - sh
                - -c
                - |
                  ES_URL="https://elasticsearch-master:9200"
                  AUTH="elastic:$ELASTIC_PASSWORD"

                  # Register repo if not exists
                  curl -sk -u "$AUTH" -X PUT "$ES_URL/_snapshot/backup" \
                    -H 'Content-Type: application/json' \
                    -d "{\"type\":\"fs\",\"settings\":{\"location\":\"/usr/share/elasticsearch/data/backups\"}}" || true

                  # Create snapshot
                  SNAP="snapshot-$(date +%Y%m%d-%H%M%S)"
                  curl -sk -u "$AUTH" -X PUT "$ES_URL/_snapshot/backup/$SNAP?wait_for_completion=true"
              env:
                - name: ELASTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-master-credentials
                      key: password
          restartPolicy: OnFailure
